name: Deploy to Azure Container Apps

on:
    workflow_run:
        workflows: ["Build and Push Docker Image"]
        types: [completed]
        branches: [main]

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}
    CONTAINER_APP_NAME: my-app
    RESOURCE_GROUP: my-resource-group

jobs:
    deploy:
        runs-on: ubuntu-latest
        if: ${{ github.event.workflow_run.conclusion == 'success' }}

        steps:
            - name: Log in to Azure
              uses: azure/login@v2
              with:
                  creds: ${{ secrets.AZURE_CREDENTIALS }}

            - name: Deploy to Azure Container Apps
              uses: azure/container-apps-deploy-action@v1
              with:
                  containerAppName: ${{ env.CONTAINER_APP_NAME }}
                  resourceGroup: ${{ env.RESOURCE_GROUP }}
                  imageToDeploy: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.event.workflow_run.head_sha }}
                  registryUrl: ${{ env.REGISTRY }}
                  registryUsername: ${{ secrets.GHCR_USERNAME }}
                  registryPassword: ${{ secrets.GHCR_TOKEN }}
              #   targetPort: 3000
              #   environmentVariables: "NODE_ENV=production PORT=3000"
