services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dnd-manager
    volumes:
      - pgdata:/var/lib/postgresql/data
